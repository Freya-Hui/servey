    h3 { margin:18px 0 8px; color:var(--magenta); font-size:18px; }
    p { line-height:1.55; margin:8px 0; }
    .muted { color:var(--muted); }
    .hero { border-radius:18px; padding:28px; background:linear-gradient(135deg,#4b168c,#98106a); color:#fff; }
    .hero h1 { color:#fff; max-width:780px; }
    .hero p { color:#f7eefb; max-width:780px; }

    .lang strong { display:block; color:var(--purple); font-size:20px; margin-bottom:5px; }
    .brand { min-height:268px; display:flex; flex-direction:column; justify-content:space-between; gap:10px; position:relative; transition:.15s; overflow:hidden; }

    .brand-logo img { max-width:100%; max-height:30px; object-fit:contain; }
    .brand-logo .wordmark { color:var(--purple); font-size:20px; font-weight:900; letter-spacing:.02em; }
    .brand-logo img + .wordmark { display:none; }

    .brand-visual img { width:100%; height:100%; object-fit:contain; display:block; }
    .brand-visual .visual-fallback { padding:12px; text-align:center; color:var(--purple); font-weight:800; line-height:1.25; }
    .brand-visual img + .visual-fallback { display:none; }
    .brand-name { font-weight:800; text-align:center; line-height:1.2; }
    .brand-classic { color:var(--muted); font-size:12px; text-align:center; line-height:1.3; min-height:30px; }
    .brand-source { color:var(--purple); font-size:11px; text-align:center; text-decoration:none; font-weight:700; overflow-wrap:anywhere; line-height:1.25; }
    .logic { background:#fbf9fd; border:1px solid var(--line); border-radius:14px; padding:14px; margin:14px 0; }
    .field { margin:15px 0; }
    label { display:block; font-weight:700; margin-bottom:7px; }

    textarea { min-height:86px; resize:vertical; }
    .options { display:grid; gap:9px; margin-top:8px; }
    .option { display:flex; gap:10px; align-items:flex-start; }
    .option input, .brand input { margin-top:3px; }
    .scenario { border:1px solid var(--line); border-radius:16px; padding:18px; background:linear-gradient(180deg,#fff,#fbf9fd); margin:18px 0; }
    .scenario-head { display:grid; gap:16px; }
    .placeholder { flex:0 0 230px; min-height:170px; border:2px dashed #b8abd0; border-radius:14px; background:#faf8fd; color:var(--muted); display:flex; align-items:center; justify-content:center; text-align:center; padding:14px; font-size:14px; }

    .scenario-title { color:var(--purple); font-weight:800; font-size:20px; margin-bottom:6px; }
    .scale-row { border-top:1px solid #ece6f3; padding-top:12px; margin-top:12px; }
    .prompt { font-weight:700; margin-bottom:7px; }
    .scale { display:grid; grid-template-columns:repeat(7,1fr); gap:7px; }
    .scale input { display:none; }
    .scale span { min-height:38px; display:flex; align-items:center; justify-content:center; border:1px solid #cfc5df; border-radius:10px; background:#fff; cursor:pointer; font-weight:700; }
    .scale input:checked + span { background:var(--purple); color:#fff; border-color:var(--purple); }
    .scale-help { display:flex; justify-content:space-between; color:var(--muted); font-size:12px; margin-top:4px; }
    .sortable { display:grid; gap:10px; margin-top:14px; }
    .drag-card { border:1px solid var(--line); background:#fff; border-radius:14px; padding:13px; cursor:grab; display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; user-select:none; -webkit-user-select:none; touch-action:manipulation; }

    .handle { color:var(--purple); font-weight:900; font-size:18px; }
    .rank-actions { display:flex; gap:6px; align-items:center; }
    .rank-btn { width:38px; height:38px; padding:0; border-radius:10px; background:#f4eef9; color:var(--purple); border:1px solid var(--line); font-size:18px; line-height:1; }

    .channel { border:1px solid var(--line); background:#fff; border-radius:14px; padding:12px; display:flex; gap:10px; align-items:flex-start; cursor:pointer; }
    .channel input { margin-top:3px; }
    .btns { display:flex; gap:10px; justify-content:space-between; flex-wrap:wrap; margin:20px 0 0; }
    button { border:0; border-radius:12px; padding:12px 16px; font:inherit; font-weight:800; cursor:pointer; }
    .primary { background:var(--purple); color:#fff; }
    .secondary { background:#eae3f3; color:var(--purple); }
    .ghost { background:#fff; border:1px solid var(--line); color:var(--muted); }
    .status { border-radius:12px; padding:12px; margin-top:12px; display:none; }
    .status.ok { display:block; background:#ecfdf5; color:var(--green); border:1px solid #a7f3d0; }
    .status.err { display:block; background:#fef3f2; color:var(--red); border:1px solid #fecaca; }
    .validation-message { border-radius:12px; padding:12px; margin-top:14px; background:#fef3f2; color:var(--red); border:1px solid #fecaca; font-weight:700; }
    .invalid-field { outline:2px solid #f87171; outline-offset:3px; border-radius:12px; }
    .ai-tools { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .ai-suggestion { border:1px solid var(--line); border-radius:14px; background:#fbf9fd; padding:13px; color:var(--ink); line-height:1.55; margin-top:10px; white-space:pre-wrap; }
    .mini-note { color:var(--muted); font-size:12px; line-height:1.4; }
    .hidden { display:none !important; }
    @media (max-width:760px) { .wrap { padding:14px; } .screen { padding:18px; } h1 { font-size:28px; } .lang-grid,.brand-grid,.channel-grid { grid-template-columns:1fr; } .scale { gap:5px; } .placeholder,.scenario-media { flex-basis:100%; } .scenario-media-frame { min-height:220px; } }
  </style>

function save(){

  if(el.type==="radio"){ if(el.checked) state[el.name]=el.value; }
  else if(el.type==="checkbox"){ state[el.name] = [...document.querySelectorAll(`input[name="${el.name}"]:checked`)].map(x=>x.value); }
  else state[el.name]=el.value;
 });
 updateRankingState();
 updateConditionalFields();
}
function restore(){
 Object.entries(state).forEach(([k,v])=>{
  document.querySelectorAll(`[name="${k}"]`).forEach(el=>{
   if(el.type==="radio") el.checked = el.value===v;
   else if(el.type==="checkbox") el.checked = Array.isArray(v) && v.includes(el.value);
   else el.value = v ?? "";
  });
 });
 updateConditionalFields();
}
function opt(name,value,text){ return `<label class="option"><input type="radio" name="${name}" value="${value}" onchange="save();updateConditionalFields()"><span>${text}</span></label>`; }
function scale(name,text){ return `<div class="scale-row"><div class="prompt">${text}</div><div class="scale">${[1,2,3,4,5,6,7].map(n=>`<label><input type="radio" name="${name}" value="${n}"><span>${n}</span></label>`).join("")}</div><div class="scale-help"><span>1 ${tr("low")}</span><span>7 ${tr("high")}</span></div></div>`; }
function languageScreen(){ return `<section class="screen active"><div class="hero"><span class="badge">Pilot survey</span><h1>Chinese Luxury Brand Internationalization</h1><p>Culture-through-product branding test</p></div><h2 style="margin-top:22px">${T.zh.langTitle}</h2><div class="lang-grid">${["zh","en","fr"].map(l=>`<button class="lang" onclick="setLang('${l}')"><strong>${T[l].name}</strong><span>${T[l].subtitle}</span></button>`).join("")}</div></section>`; }
function introScreen(){ return `<section class="screen"><span class="badge">${tr("time")}</span><h1>${tr("title")}</h1><p>${tr("subtitle")}</p><div class="logic"><p>${tr("logic")}</p></div></section>`; }
function durationSelect(){ return `<select name="overseas_duration"><option></option>${durationOptions.map(o=>`<option value="${o.value}">${o[lang] || o.en}</option>`).join("")}</select>`; }
function profileScreen(){ return `<section class="screen must-complete"><h2>${tr("profile")}</h2><div class="field"><label>${tr("group")}</label><div class="options">${opt("respondent_group","china",tr("china"))}${opt("respondent_group","overseas_chinese",tr("overseas"))}${opt("respondent_group","foreign",tr("foreign"))}</div></div><div class="field hidden" id="countryField"><label>${tr("country")}</label><input type="text" name="country"></div><div class="field hidden" id="overseasDurationField"><label>${tr("overseasDuration")}</label>${durationSelect()}</div><div class="field"><label>${tr("age")}</label><select name="age"><option></option><option>18-24</option><option>25-34</option><option>35-44</option><option>45+</option></select></div><div class="field"><label>${tr("luxury")}</label><div class="options">${opt("luxury_experience","yes",tr("yes"))}${opt("luxury_experience","no",tr("no"))}${opt("luxury_experience","unsure",tr("unsure"))}</div></div></section>`; }
function imageTag(src,alt){ return src ? `<img src="${src}" alt="${alt}" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove();">` : ""; }
function mediaCard(e){ const m=e.media || {}; const caption=m.caption?tx(m.caption):tx(e.title); const url=m.source || ""; const openText=lang==="zh"?"打开视频/案例":lang==="fr"?"Ouvrir la vidéo / le cas":"Open video / case"; const clipAttr=m.clipEnd?` data-clip-end="${m.clipEnd}" ontimeupdate="limitClip(this)" src="${m.local||""}"`:` src="${m.local||""}"`; const localVideo=m.local?`<div class="scenario-media-frame"><video controls preload="metadata" playsinline${clipAttr}></video></div>`:""; const videoFrame=localVideo || `<div class="scenario-media-frame"><div class="video-poster"><div><div class="play-mark">▶</div><strong>${caption}</strong><br><a class="video-action" href="${url}" target="_blank" rel="noopener noreferrer">${openText}</a></div></div></div>`; const imageFrame=`<div class="scenario-media-frame">${imageTag(m.image,caption)}<div class="media-fallback">${caption}</div></div>`; const sourceLink=(!m.local && url)?`<a class="media-source" href="${url}" target="_blank" rel="noopener noreferrer">${tr("sourceLabel")}: ${url}</a>`:""; return `<div class="scenario-media">${m.kind==="video"?videoFrame:imageFrame}<div class="media-caption">${caption}</div>${sourceLink}</div>`; }
function limitClip(video){ const end=Number(video.dataset.clipEnd||0); if(end && video.currentTime>=end){ video.pause(); video.currentTime=end; } }
function brandCard(b){ const classic=tx(b.classic); return `<label class="brand"><input type="checkbox" name="known_brands" value="${b.name}"><div class="brand-logo">${imageTag(b.logo,b.name)}<span class="wordmark">${b.mark}</span></div><div class="brand-visual">${imageTag(b.image,classic)}<div class="visual-fallback">${classic}</div></div><div class="brand-name">${b.name}</div><div class="brand-classic">${classic}</div><a class="brand-source" href="${b.link}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${b.link}</a></label>`; }
function brandScreen(){ return `<section class="screen brand-required"><h2>${tr("brands")}</h2><p class="muted">${tr("brandsHint")}</p><div class="brand-grid">${brands.map(brandCard).join("")}</div><div class="field"><label>${tr("otherBrands")}</label><input type="text" name="other_known_brands"></div></section>`; }
function evalScreen(){ const qs=[["chinese_identity",tr("qChinese")],["understanding",tr("qUnderstand")],["translation_quality",tr("qTranslate")],["luxury_value",tr("qLuxury")],["authenticity",tr("qAuthentic")],["international_fit",tr("qInternational")],["interest",tr("qInterest")]]; return `<section class="screen must-complete"><h2>${tr("evalTitle")}</h2><p class="muted">${tr("evalHint")}</p>${expressions.map(e=>`<div class="scenario"><div class="scenario-head">${mediaCard(e)}<div class="scenario-copy"><div class="scenario-title">${tx(e.title)}</div><p>${tx(e.product)}</p></div></div>${qs.map(([k,text])=>scale(`${e.id}_${k}`,text)).join("")}</div>`).join("")}</section>`; }
function channelScreen(){ return `<section class="screen checkbox-required"><h2>${tr("channels")}</h2><p class="muted">${tr("channelsHint")}</p><div class="channel-grid">${channels.map(c=>`<label class="channel"><input type="checkbox" name="effective_channels" value="${c.id}"><span>${c[lang] || c.en}</span></label>`).join("")}</div></section>`; }
function rankingScreen(){ return `<section class="screen"><h2>${tr("ranking")}</h2><p class="muted">${tr("rankingHint")}</p><div id="sortable" class="sortable">${rankingCardsHtml()}</div></section>`; }
function rankingCardsHtml(){ const order=state.ranking_order || expressions.map(e=>e.id); return order.map((id,pos)=>rankCard(id,pos,order.length)).join(""); }
function rankCard(id,pos,total){ const e=expressions.find(x=>x.id===id); return `<div class="drag-card" draggable="true" data-id="${id}"><span class="handle">↕</span><div><strong>${tx(e.title)}</strong><br><span class="muted">${tx(e.product)}</span></div><div class="rank-actions"><button type="button" class="rank-btn" onclick="moveRank('${id}',-1)" ${pos===0?"disabled":""}>↑</button><button type="button" class="rank-btn" onclick="moveRank('${id}',1)" ${pos===total-1?"disabled":""}>↓</button></div></div>`; }
function groupSpecificContent(){ const group=state.respondent_group || "china"; const hintKey=group==="overseas_chinese"?"fHintOverseas":group==="foreign"?"fHintForeign":"fHintChina"; const qs=groupQuestionSets[group] || groupQuestionSets.china; return `<h2>${tr("accTitle")}</h2><p class="muted">${tr("accHint")}</p><div class="logic"><p>${tr(hintKey)}</p></div>${qs.map(q=>scale(q.id,tx(q.text))).join("")}`; }
function groupSpecificScreen(){ return `<section class="screen group-specific must-complete">${groupSpecificContent()}</section>`; }
function updateGroupSpecificScreen(){ const screen=document.querySelector(".group-specific"); if(screen) screen.innerHTML=groupSpecificContent(); }
function finalScreen(){ return `<section class="screen"><h2>${tr("finalTitle")}</h2><div class="field"><label>${tr("finalOpen")}</label><textarea id="finalRecommendation" name="final_recommendation" placeholder="${tr("aiFallback")}"></textarea><div class="ai-tools"><button type="button" class="secondary" onclick="polishFinalAnswer()">${tr("aiHelp")}</button><button type="button" class="ghost hidden" id="insertAiBtn" onclick="insertAiSuggestion()">${tr("aiInsert")}</button></div><div class="mini-note">${tr("aiNote")}</div><div id="aiSuggestion" class="ai-suggestion hidden"></div></div></section>`; }
function thanksScreen(){ return `<section class="screen"><h2>${tr("submit")}</h2><p class="muted">${tr("submitting")}</p><div id="status" class="status"></div><div class="btns"><button class="primary" onclick="submitResponse()">${tr("submit")}</button></div></section>`; }
function build(){ return [languageScreen(),introScreen(),profileScreen(),brandScreen(),evalScreen(),channelScreen(),rankingScreen(),groupSpecificScreen(),finalScreen(),thanksScreen()]; }
function setLang(l){ lang=l; state.language=l; render(); show(1); }
function render(){ document.getElementById("app").innerHTML = build().join("") + `<div class="btns" id="nav"><button class="secondary" onclick="prev()">${tr("back")}</button><button class="primary" onclick="next()">${tr("next")}</button><button class="ghost" onclick="resetSurvey()">${tr("reset")}</button></div>`; restore(); bindDrag(); }
function visibleScreens(){ return [...document.querySelectorAll(".screen")]; }
function show(n){ save(); updateGroupSpecificScreen(); const screens=visibleScreens(); index=Math.max(0,Math.min(n,screens.length-1)); document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); screens[index].classList.add("active"); document.getElementById("progress").style.width=Math.round((index+1)/screens.length*100)+"%"; document.getElementById("stepLabel").textContent=`${tr("step")} ${index+1} / ${screens.length}`; document.getElementById("timeLabel").textContent=tr("time"); const nav=document.getElementById("nav"); nav.style.display=index===0?"none":"flex"; nav.querySelector(".secondary").style.visibility=index<=1?"hidden":"visible"; nav.querySelector(".primary").textContent=index===screens.length-1?tr("finish"):tr("next"); restore(); bindDrag(); window.scrollTo({top:0,behavior:"smooth"}); }
function showValidation(screen,msg){ let box=screen.querySelector(".validation-message"); if(!box){ box=document.createElement("div"); box.className="validation-message"; screen.appendChild(box); } box.textContent=msg; box.scrollIntoView({behavior:"smooth",block:"center"}); }
function clearValidation(screen){ screen.querySelectorAll(".validation-message").forEach(x=>x.remove()); screen.querySelectorAll(".invalid-field").forEach(x=>x.classList.remove("invalid-field")); }
function isVisible(el){ return !!(el.offsetWidth || el.offsetHeight || el.getClientRects().length); }
function markInvalid(el){ const field=el.closest(".field,.scale-row,.scenario,.channel-grid,.brand-grid") || el; field.classList.add("invalid-field"); }
function validateCurrentScreen(){ const screens=visibleScreens(); const screen=screens[index]; if(!screen || index===0) return true; clearValidation(screen); save(); if(screen.classList.contains("brand-required")){ const hasBrand=[...screen.querySelectorAll('input[name="known_brands"]:checked')].length>0; const other=(screen.querySelector('input[name="other_known_brands"]')?.value||"").trim(); if(!hasBrand && !other){ markInvalid(screen.querySelector(".brand-grid")||screen); showValidation(screen,tr("validationBrand")); return false; } return true; } if(screen.classList.contains("checkbox-required")){ const checked=[...screen.querySelectorAll('input[type="checkbox"]:checked')].filter(isVisible); if(!checked.length){ markInvalid(screen.querySelector(".channel-grid")||screen); showValidation(screen,tr("validationRequired")); return false; } return true; } if(screen.classList.contains("must-complete")){ const names=[...new Set([...screen.querySelectorAll("input,select,textarea")].filter(el=>isVisible(el) && el.name).map(el=>el.name))]; for(const name of names){ const els=[...screen.querySelectorAll(`[name="${name}"]`)].filter(isVisible); if(!els.length) continue; const first=els[0]; let ok=true; if(first.type==="radio" || first.type==="checkbox") ok=els.some(el=>el.checked); else ok=(first.value||"").trim()!==""; if(!ok){ markInvalid(first); showValidation(screen,tr("validationRequired")); return false; } } return true; } return true; }
function next(){ save(); if(!validateCurrentScreen()) return; show(index+1); }
function prev(){ save(); show(index-1); }
function resetSurvey(){ if(confirm("Reset all answers?")){ Object.keys(state).forEach(k=>delete state[k]); state.language=lang; state.ranking_order=expressions.map(e=>e.id); show(1); } }
function updateConditionalFields(){ const country=document.getElementById("countryField"); const duration=document.getElementById("overseasDurationField"); const needsCountry=state.respondent_group==="overseas_chinese" || state.respondent_group==="foreign"; if(country) country.classList.toggle("hidden", !needsCountry); if(duration) duration.classList.toggle("hidden", state.respondent_group!=="overseas_chinese"); }
function renderRankingList(){ const box=document.getElementById("sortable"); if(box){ box.innerHTML=rankingCardsHtml(); bindDrag(); } }
function moveRank(id,dir){ const order=[...(state.ranking_order || expressions.map(e=>e.id))]; const i=order.indexOf(id); const j=i+dir; if(i<0 || j<0 || j>=order.length) return; [order[i],order[j]]=[order[j],order[i]]; state.ranking_order=order; renderRankingList(); }
function bindDrag(){ const box=document.getElementById("sortable"); if(!box) return; box.querySelectorAll(".drag-card").forEach(card=>{ card.addEventListener("dragstart",e=>{ if(e.target.closest("button")){ e.preventDefault(); return; } dragId=card.dataset.id; card.classList.add("dragging");}); card.addEventListener("dragend",()=>{dragId=null; card.classList.remove("dragging"); updateRankingState(); renderRankingList();}); card.addEventListener("dragover",e=>e.preventDefault()); card.addEventListener("drop",e=>{e.preventDefault(); if(!dragId || dragId===card.dataset.id) return; const dragging=box.querySelector(`[data-id="${dragId}"]`); box.insertBefore(dragging, card); updateRankingState(); renderRankingList();}); }); }
function updateRankingState(){ const box=document.getElementById("sortable"); if(box) state.ranking_order=[...box.querySelectorAll(".drag-card")].map(x=>x.dataset.id); }
function flatData(){ save(); return {...state, submitted_at_client:new Date().toISOString(), user_agent:navigator.userAgent}; }
function num(v){ return v===""||v===undefined?null:Number(v); }
async function polishFinalAnswer(){ save(); const box=document.getElementById("aiSuggestion"); const insert=document.getElementById("insertAiBtn"); const textarea=document.getElementById("finalRecommendation"); const original=(textarea?.value||"").trim(); if(!box) return; box.classList.remove("hidden"); if(insert) insert.classList.add("hidden"); if(!original){ box.textContent=tr("aiFallback"); state.final_ai_suggestion=""; return; } box.textContent=tr("aiThinking"); let suggestion=""; if(AI_HELP_ENDPOINT){ try{ const payload={...flatData(), polish_text:original, task:"polish_final_answer", language:lang}; const res=await fetch(AI_HELP_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${SUPABASE_ANON_KEY}`},body:JSON.stringify(payload)}); const data=await res.json(); suggestion=data.polished || data.suggestion || ""; }catch(e){ suggestion=""; } } if(!suggestion) suggestion=localPolishSuggestion(original); state.final_ai_suggestion=suggestion; box.textContent=suggestion; if(insert) insert.classList.remove("hidden"); }
function localPolishSuggestion(original){ const clean=original.replace(/\s+/g," ").trim().replace(/[。.!?？]+$/,""); if(lang==="en") return `My recommendation is: ${clean}.`; if(lang==="fr") return `Ma recommandation est la suivante : ${clean}.`; return `我的建议是：${clean}。`; }
function insertAiSuggestion(){ const textarea=document.getElementById("finalRecommendation"); if(!textarea || !state.final_ai_suggestion) return; textarea.value=state.final_ai_suggestion; state.final_recommendation=state.final_ai_suggestion; state.final_ai_used=true; }
function rowForSupabase(){ const d=flatData(); const row={language:d.language, respondent_group:d.respondent_group||null, country:(d.respondent_group==="overseas_chinese"||d.respondent_group==="foreign")?(d.country||null):null, overseas_duration:d.respondent_group==="overseas_chinese"?(d.overseas_duration||null):null, age:d.age||null, luxury_experience:d.luxury_experience||null, known_brands:d.known_brands||[], other_known_brands:d.other_known_brands||null, effective_channels:d.effective_channels||[], ranking_order:d.ranking_order||[], group_q1:num(d.group_q1), group_q2:num(d.group_q2), group_q3:num(d.group_q3), group_q4:num(d.group_q4), group_q5:num(d.group_q5), final_recommendation:d.final_recommendation||null, final_ai_suggestion:d.final_ai_suggestion||null, final_ai_used:!!d.final_ai_used, response_json:d}; expressions.forEach(e=>["understanding","chinese_identity","translation_quality","luxury_value","authenticity","international_fit","interest"].forEach(k=>row[`${e.id}_${k}`]=num(d[`${e.id}_${k}`]))); ["acc_chinese_culture_familiarity","acc_host_market_understanding","acc_foreigner_readability","acc_need_translation","acc_prefer_subtle"].forEach(k=>row[k]=num(d[k])); return row; }
function setStatus(kind,msg){ const el=document.getElementById("status"); if(!el) return; el.className="status "+kind; el.textContent=msg; }
async function submitResponse(){ setStatus("ok",tr("submitting")); const {error}=await supabaseClient.from("luxury_survey_responses").insert(rowForSupabase()); if(error) setStatus("err",tr("failed")+error.message); else setStatus("ok",tr("saved")); }
render(); show(0);
</script>
</body>
</html>
